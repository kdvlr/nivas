<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Davuluri family mark: four figures with raised arms -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- mother (coral), left, one arm up -->
    <g stroke="#e2543f" fill="#e2543f">
      <circle cx="16" cy="17" r="6.5" stroke="none"/>
      <path d="M16 24 L16 40" stroke-width="9"/>
      <path d="M9 45 L23 45 L20 40 L12 40 Z" stroke="none"/>
      <path d="M16 27 L8 16" stroke-width="5"/>
      <path d="M16 27 L24 31" stroke-width="5"/>
      <path d="M13 44 L11 55" stroke-width="5"/>
      <path d="M19 44 L21 55" stroke-width="5"/>
    </g>
    <!-- father (orange), center-back, both arms up, tallest -->
    <g stroke="#f4992f" fill="#f4992f">
      <circle cx="33" cy="12" r="6.8" stroke="none"/>
      <path d="M33 19 L33 40" stroke-width="9"/>
      <path d="M33 23 L23 13" stroke-width="5.5"/>
      <path d="M33 23 L44 14" stroke-width="5.5"/>
      <path d="M33 40 L28 53" stroke-width="5.5"/>
      <path d="M33 40 L38 53" stroke-width="5.5"/>
    </g>
    <!-- child (teal), right, one arm up -->
    <g stroke="#37a8a0" fill="#37a8a0">
      <circle cx="49" cy="27" r="5.6" stroke="none"/>
      <path d="M49 33 L49 46" stroke-width="7.5"/>
      <path d="M49 36 L58 28" stroke-width="4.5"/>
      <path d="M49 36 L42 40" stroke-width="4.5"/>
      <path d="M49 46 L45 56" stroke-width="4.5"/>
      <path d="M49 46 L53 56" stroke-width="4.5"/>
    </g>
    <!-- small child (yellow), front-center, both arms up -->
    <g stroke="#f3c63d" fill="#f3c63d">
      <circle cx="31" cy="37" r="5.4" stroke="none"/>
      <path d="M31 43 L31 53" stroke-width="7.5"/>
      <path d="M31 45 L24 39" stroke-width="4.5"/>
      <path d="M31 45 L38 39" stroke-width="4.5"/>
      <path d="M31 53 L27 61" stroke-width="4.5"/>
      <path d="M31 53 L35 61" stroke-width="4.5"/>
    </g>
  </g>
</svg>
